<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phasmophobia RPG</title>
<style>
:root{
  --bg:#0b0f14; --panel:#121923; --panel2:#182231; --line:#2b3a4d;
  --text:#eef5ff; --muted:#94a7bd; --accent:#7dd3fc; --good:#6ee7b7;
  --warn:#fbbf24; --bad:#fb7185; --purple:#c084fc;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#172033,#0b0f14 55%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
.wrap{max-width:1250px;margin:0 auto;padding:22px}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
h1{margin:0;font-size:34px;letter-spacing:.5px}
.sub{color:var(--muted);font-size:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
button,.btn{border:1px solid var(--line);background:linear-gradient(#223044,#182231);color:var(--text);border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
button:hover{border-color:var(--accent)}
button.primary{background:linear-gradient(#0ea5e9,#0369a1);border-color:#38bdf8}
button.danger{background:linear-gradient(#7f1d1d,#450a0a);border-color:#fb7185}
button:disabled{opacity:.45;cursor:not-allowed}
.tabs{display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}
.tabbtn{border-radius:12px 12px 0 0;border-bottom:none;background:#101722;color:var(--muted)}
.tabbtn.active{background:var(--panel);color:var(--text);border-color:var(--accent)}
.tab{display:none}
.tab.active{display:block}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.card{background:linear-gradient(180deg,var(--panel),#0f1620);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.25)}
.card h2,.card h3{margin:0 0 12px}
.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.value{font-size:24px;font-weight:900;margin-top:3px}
.bar{height:12px;border-radius:999px;background:#0b111a;border:1px solid var(--line);overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--good));width:0%}
.small{font-size:13px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}
th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-weight:800;font-size:12px;background:#0d1520}
.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.accent{color:var(--accent)}.purple{color:var(--purple)}
.equipgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.gear{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:12px}
.gear .name{font-size:17px;font-weight:900}
.gear .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.gear.locked{opacity:.7}
.shopgrid,.talentgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.shopitem,.talent{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:13px}
.talent.owned{border-color:var(--good)}
input,select{width:100%;background:#0c131d;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px}
input.invalid,select.invalid{border-color:var(--bad);box-shadow:0 0 0 2px rgba(251,113,133,.2)}
.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.checks{display:grid;gap:8px;margin-top:8px}
.checks label{display:flex;gap:8px;align-items:center}
.checks input{width:auto}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:10}
.modal.active{display:flex}
.modalbox{width:min(640px,100%);background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.modalhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.close{padding:7px 10px}
.errors{display:none;background:rgba(251,113,133,.12);border:1px solid var(--bad);border-radius:12px;padding:10px;margin-bottom:12px;color:#fecdd3}
.result{font-size:18px;line-height:1.55}
.result strong{font-size:24px}
.rules h3{margin-top:22px}.rules li{margin:6px 0}
.hidden{display:none!important}
@media(max-width:850px){.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.statrow{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>Phasmophobia RPG v1.0.3</h1>
    <div class="sub">Companion RPG campaign tracker for Phasmophobia</div>
  </div>
  <div class="actions">
    <button class="primary" onclick="openContract()">Complete Contract</button>
    <button onclick="saveFile()">Save Character</button>
    <button onclick="document.getElementById('loadFile').click()">Load Character</button>
    <input id="loadFile" type="file" accept=".json" class="hidden" onchange="loadFile(event)">
    <button class="danger" onclick="newCharacter()">New Character</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<section id="getting" class="tab rules"></section>
<section id="character" class="tab"></section>
<section id="equipment" class="tab"></section>
<section id="talents" class="tab"></section>
<section id="progress" class="tab"></section>
<section id="shop" class="tab"></section>
<section id="rules" class="tab rules"></section>
</div>

<div class="modal" id="contractModal">
  <div class="modalbox">
    <div class="modalhead"><h2>Complete Contract</h2><button class="close" onclick="closeModal('contractModal')">✕</button></div>
    <div class="errors" id="contractErrors"></div>
    <div class="formgrid">
      <label>Map<select id="cMap"></select></label>
      <label>Difficulty<select id="cDiff"></select></label>
      <label>In-game Reward Money<input id="cMoney" type="number" min="1" max="10000" value="" placeholder="1 - 10000"></label>
      <div class="checks">
        <label><input id="cCorrect" type="checkbox" checked> Ghost identified correctly</label>
        <label><input id="cAlive" type="checkbox" checked> Player survived</label>
        <label><input id="cPerfect" type="checkbox"> Perfect Investigation</label>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">
      <button onclick="closeModal('contractModal')">Cancel</button>
      <button class="primary" onclick="submitContract()">Roll Loot</button>
    </div>
  </div>
</div>

<div class="modal" id="resultModal">
  <div class="modalbox">
    <div class="modalhead"><h2>Contract Complete</h2><button class="close" onclick="closeModal('resultModal')">✕</button></div>
    <div class="result" id="resultBody"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="primary" onclick="closeModal('resultModal'); showTab('character')">Continue</button>
    </div>
  </div>
</div>

<div class="modal" id="shopModal">
  <div class="modalbox">
    <div class="modalhead"><h2>Purchase Complete</h2><button class="close" onclick="closeModal('shopModal')">✕</button></div>
    <div class="result" id="shopBody"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="primary" onclick="closeModal('shopModal')">Continue</button>
    </div>
  </div>
</div>

<script>
const SAVE_VERSION="1.0.3";
const DIFFS=["Amateur","Intermediate","Professional","Nightmare","Insanity"];
const MAPS=["Tanglewood Drive","Edgefield Road","Ridgeview Court","Willow Street","Grafton Farmhouse","Bleasdale Farmhouse","Camp Woodwind","Maple Lodge Campsite","Prison","Brownstone High School","Sunny Meadows","Sunny Meadows Restricted","Point Hope"];
const PRIMARY=["EMF Reader","Flashlight","UV Light","Spirit Box","Ghost Writing Book","Thermometer","DOTS Projector","Video Camera"];
const SECONDARY=["Salt","Incense","Igniter","Firelight","Crucifix","Motion Sensor","Sound Sensor","Tripod","Head Gear","Sanity Medication","Parabolic Microphone"];
const CURSED_ITEMS=["Music Box","Ouija Board","Tarot Cards","Haunted Mirror","Voodoo Doll","Summoning Circle","Monkey Paw"];
const ITEM_CAPS={"D.O.T.S Projector":2,"DOTS Projector":2,"EMF Reader":2,"Flashlight":4,"Ghost Writing Book":2,"Spirit Box":2,"Thermometer":2,"UV Light":2,"Video Camera":4,"Crucifix":2,"Salt":3,"Incense":4,"Igniter":4,"Firelight":4,"Motion Sensor":4,"Sound Sensor":4,"Tripod":4,"Head Gear":4,"Sanity Medication":4,"Parabolic Microphone":2};
function itemCap(n){return ITEM_CAPS[n]||3}
const LEVEL_DIFF=[["Amateur",1],["Intermediate",5],["Professional",10],["Nightmare",20],["Insanity",35]];
const TALENTS=[
 ["unlockShop","Unlock Shop","Unlocks the Shop tab and allows Gold to be spent on gear, slots, upgrades, and randomly available Talent Points.",3,"Key Unlocks"],
 ["cartographer","Unlock Dailies","Unlocks daily map bonuses on the Character screen. The first successful clear on each map each day grants a flat +100 Gold.",2,"Key Unlocks"],
 ["cursedMusicBox","Cursed Attunement: Music Box","You may use the Music Box during contracts.",2,"Cursed Items"],
 ["cursedOuijaBoard","Cursed Attunement: Ouija Board","You may use the Ouija Board during contracts.",2,"Cursed Items"],
 ["cursedTarotCards","Cursed Attunement: Tarot Cards","You may use Tarot Cards during contracts.",2,"Cursed Items"],
 ["cursedHauntedMirror","Cursed Attunement: Haunted Mirror","You may use the Haunted Mirror during contracts.",2,"Cursed Items"],
 ["cursedVoodooDoll","Cursed Attunement: Voodoo Doll","You may use the Voodoo Doll during contracts.",2,"Cursed Items"],
 ["cursedSummoningCircle","Cursed Attunement: Summoning Circle","You may use the Summoning Circle during contracts.",2,"Cursed Items"],
 ["cursedMonkeyPaw","Cursed Attunement: Monkey Paw","You may use the Monkey Paw during contracts.",2,"Cursed Items"],
 ["keenEye","Keen Eye","Perfect-style play grants +5% Gold from contracts.",1,"General"],
 ["professional","Professional","Correct ghost bonus is increased by +20 Gold.",1,"General"],
 ["survivor","Survivor","Surviving grants +5% EXP.",1,"General"],
 ["photographer","Photographer","Contracts grant +5% EXP.",2,"Experience"],
 ["experience","Experience","Contracts grant an additional +5% EXP.",2,"Experience"],
 ["fastLearner","Fast Learner","The first contract after loading the tracker grants +50 EXP.",1,"Experience"],
 ["prepared","Prepared","Each level-up grants +75 Gold.",2,"Experience"],
 ["seasonedSpecialist","Seasoned Specialist","Each level-up grants an additional +75 Gold.",3,"Experience"],
 ["thorough","Thorough","Contracts grant +5% Gold.",2,"Economy"],
 ["organized","Organized","Gold Cache loot rewards are +5% larger.",1,"Economy"],
 ["treasureHunter","Treasure Hunter","Gold Cache loot rewards are +10% larger.",2,"Economy"],
 ["stockpile","Stockpile","Gold Cache loot rewards are an additional +10% larger.",3,"Economy"],
 ["veteranInvestigator","Veteran Investigator","Perfect Investigations add +100 Gold.",3,"Economy"],
 ["mapExpert","Route Planner","Successful contracts on maps with fewer than 5 lifetime clears grant +25 Gold.",2,"Economy"],
 ["gearMaintenance","Gear Maintenance","Gear tier upgrades cost 10% less.",2,"Shop"],
 ["efficientStorage","Efficient Storage","Slot upgrades cost 10% less.",2,"Shop"],
 ["quartermaster","Quartermaster","Secondary equipment unlocks cost 10% less.",2,"Shop"],
 ["fieldRepairs","Field Repairs","Shop rerolls cost 10% less.",1,"Shop"],
 ["gambler","Gambler","Shop rerolls cost an additional 10% less.",2,"Shop"],
 ["discountHunter","Discount Hunter","All shop purchases cost 5% less.",4,"Shop"],
 ["logistics","Logistics","Shop stock contains 5 items instead of 4.",3,"Shop"],
 ["luckyFind","Lucky Find","Equipment Unlock loot weight is increased by +5.",2,"Loot"],
 ["arsenal","Arsenal","Slot Unlock loot weight is increased by +5.",2,"Loot"],
 ["jackpot","Jackpot","Gold Cache loot has a 5% chance to add +100 bonus Gold.",3,"Loot"],
 ["fortuneFavors","Fortune Favors","When playing above your recommended difficulty, the EXP/Gold penalty is 15% per tier instead of 20% per tier.",5,"Loot"]
];
const BASE_TABS=[
 ["getting","Getting Started"],["character","Character"],["equipment","Equipment"],["talents","Talents"],["progress","Progress"],["shop","Shop"],["rules","Rules"]
];
function todayKey(){return new Date().toLocaleDateString('en-CA')}
function resetCartographerDaily(){
 state.cartographerDaily ||= {date:todayKey(),maps:{}};
 if(state.cartographerDaily.date !== todayKey()) state.cartographerDaily = {date:todayKey(),maps:{}};
}
function nextDailyResetText(){
 const now=new Date(); const next=new Date(now); next.setHours(24,0,0,0);
 const ms=next-now, h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
 return `${h}h ${m}m`;
}
function fresh(){
 let eq={}; PRIMARY.forEach(n=>eq[n]={tier:1,slots:1,primary:true}); SECONDARY.forEach(n=>eq[n]={tier:0,slots:0,primary:false});
 let prog={}; MAPS.forEach(m=>{prog[m]={}; DIFFS.forEach(d=>prog[m][d]={clears:0,perfects:0,deaths:0})});
 return {saveVersion:SAVE_VERSION,name:"Investigator",level:1,exp:0,gold:0,tp:0,equipment:eq,progress:prog,diffStats:{},talents:{},shop:[],lastLoot:"None",contracts:0,firstSession:true,cartographerDaily:{date:todayKey(),maps:{}}};
}
function repairSave(input){
 let s=input && typeof input==="object" ? input : fresh();
 const base=fresh();
 s.saveVersion = SAVE_VERSION;
 s.name ||= base.name;
 s.level = Number.isFinite(+s.level) && +s.level>0 ? Math.floor(+s.level) : 1;
 s.exp = Number.isFinite(+s.exp) && +s.exp>=0 ? Math.floor(+s.exp) : 0;
 s.gold = Number.isFinite(+s.gold) && +s.gold>=0 ? Math.floor(+s.gold) : 0;
 s.tp = Number.isFinite(+s.tp) && +s.tp>=0 ? Math.floor(+s.tp) : 0;
 s.contracts = Number.isFinite(+s.contracts) && +s.contracts>=0 ? Math.floor(+s.contracts) : 0;
 s.firstSession = s.firstSession !== false;
 s.lastLoot ||= "None";
 s.talents ||= {};
 // Talent key migrations / aliases for old saves.
 if(s.talents.mapExpert && !s.talents.routePlanner) s.talents.routePlanner = true;
 if(s.talents.unlockDailies && !s.talents.cartographer) s.talents.cartographer = true;
 s.equipment ||= {};
 PRIMARY.forEach(n=>{
   s.equipment[n] ||= {tier:1,slots:1,primary:true};
   s.equipment[n].primary=true;
   s.equipment[n].tier=Math.max(1,Math.min(3,Math.floor(+s.equipment[n].tier||1)));
   s.equipment[n].slots=Math.max(1,Math.min(itemCap(n),Math.floor(+s.equipment[n].slots||1)));
 });
 SECONDARY.forEach(n=>{
   s.equipment[n] ||= {tier:0,slots:0,primary:false};
   s.equipment[n].primary=false;
   s.equipment[n].tier=Math.max(0,Math.min(3,Math.floor(+s.equipment[n].tier||0)));
   const minSlots=s.equipment[n].tier>0?1:0;
   s.equipment[n].slots=Math.max(minSlots,Math.min(itemCap(n),Math.floor(+s.equipment[n].slots||minSlots)));
 });
 s.progress ||= {};
 MAPS.forEach(m=>{
   s.progress[m] ||= {};
   DIFFS.forEach(d=>{
     s.progress[m][d] ||= {clears:0,perfects:0,deaths:0};
     s.progress[m][d].clears=Math.max(0,Math.floor(+s.progress[m][d].clears||0));
     s.progress[m][d].perfects=Math.max(0,Math.floor(+s.progress[m][d].perfects||0));
     s.progress[m][d].deaths=Math.max(0,Math.floor(+s.progress[m][d].deaths||0));
   });
 });
 s.diffStats ||= {};
 DIFFS.forEach(d=>{
   s.diffStats[d] ||= {clears:0,perfects:0,deaths:0};
   s.diffStats[d].clears=Math.max(0,Math.floor(+s.diffStats[d].clears||0));
   s.diffStats[d].perfects=Math.max(0,Math.floor(+s.diffStats[d].perfects||0));
   s.diffStats[d].deaths=Math.max(0,Math.floor(+s.diffStats[d].deaths||0));
 });
 s.cartographerDaily ||= {date:todayKey(),maps:{}};
 if(s.cartographerDaily.date !== todayKey()) s.cartographerDaily = {date:todayKey(),maps:{}};
 s.cartographerDaily.maps ||= {};
 s.shop = Array.isArray(s.shop) ? s.shop.filter(it=>it && (it.type==="talentPoint" || (it.target && s.equipment[it.target]))) : [];
 return s;
}
let state=repairSave(JSON.parse(localStorage.getItem("phasmoRpgV1")||"null")||fresh());
resetCartographerDaily();
function expNeed(l=state.level){return 100+l*50}
function maxDiff(){let out="Amateur"; LEVEL_DIFF.forEach(([d,l])=>{if(state.level>=l)out=d}); return out}
function diffIndex(d){return DIFFS.indexOf(d)}
function tierCap(){
 const t2=countClearsAtOrAbove("Professional")>=5;
 const t3=t2 && countClearsAtOrAbove("Nightmare")>=5;
 return t3?3:t2?2:1;
}
function countClearsAtOrAbove(d){
 const i=diffIndex(d); let c=0;
 for(const m of MAPS) for(let x=i;x<DIFFS.length;x++) c+=state.progress[m][DIFFS[x]].clears||0;
 return c;
}
function saveLocal(){resetCartographerDaily();localStorage.setItem("phasmoRpgV1",JSON.stringify(state))}
function money(n){return Math.floor(n).toLocaleString()}
function hasTalent(k){return !!state.talents[k]}
function discountFor(type){
 let off=0;
 if(type==="tier"&&hasTalent("gearMaintenance")) off+=.10;
 if(type==="slot"&&hasTalent("efficientStorage")) off+=.10;
 if(type==="unlock"&&hasTalent("quartermaster")) off+=.10;
 if(hasTalent("discountHunter")) off+=.05;
 return Math.min(.4,off);
}
function price(item){
 const e=state.equipment[item.target];
 let p=500, type=item.type;
 if(type==="unlock") p=500;
 if(type==="slot") p=(e.slots+1)*450;
 if(type==="tier") p=(e.tier+1)*750;
 if(type==="talentPoint") p=2500 + state.level*150;
 return Math.max(50,Math.round(p*(1-discountFor(type))));
}
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelector(`[data-tab="${id}"]`).classList.add("active");
 localStorage.setItem("phasmoRpgTab",id);
}
function renderTabs(){
 const nav=document.getElementById("tabs"); nav.innerHTML="";
 BASE_TABS.forEach(([id,label])=>{
  const b=document.createElement("button"); b.className="tabbtn"; b.dataset.tab=id;
  if(id==="talents") b.textContent=`Talents (${state.tp})`;
  else if(id==="shop" && !hasTalent("unlockShop")) b.textContent="Shop 🔒";
  else b.textContent=label;
  b.onclick=()=>showTab(id); nav.appendChild(b);
 });
}
function render(){
 renderTabs(); renderGetting(); renderCharacter(); renderEquipment(); renderTalents(); renderProgress(); renderShop(); renderRules();
 showTab(localStorage.getItem("phasmoRpgTab") || "getting");
 saveLocal();
}
function renderGetting(){
 document.getElementById("getting").innerHTML=`
 <div class="grid"><div class="card span12 rules">
 <h2>How to Play</h2>
 <p>This tracker transforms <strong>Phasmophobia</strong> into an RPG progression system. Your character grows over time by earning experience, unlocking equipment, upgrading gear, and spending Talent Points. The Shop starts locked and must be unlocked through the Key Unlocks talent category.</p>
 <h3>Before You Begin</h3>
 <ul>
 <li>For the best experience, have all Tier 3 equipment unlocked in Phasmophobia. If not, use the highest tier currently available until you unlock it in-game.</li>
 <li>Create a <strong>new empty loadout</strong> in Phasmophobia.</li>
 <li>Equip one of every <strong>Tier 1 primary item</strong>.</li>
 <li>Do not equip any secondary equipment.</li>
 <li>Start a new character in this tracker.</li>
 <li><strong>Cursed Objects:</strong> Do not use cursed objects during investigations until your character has learned the corresponding Cursed Object Talent. Once learned, that cursed object may be used in future contracts.</li></ul>
 <h3>Completing Contracts</h3>
 <ol><li>Play a contract in Phasmophobia.</li><li>Click <strong>Complete Contract</strong>.</li><li>Enter the map, difficulty, in-game reward money, and results.</li><li>Click <strong>Roll Loot</strong>.</li><li>If loot unlocks or upgrades equipment, update your in-game loadout before the next contract.</li></ol>
 <h3>Goal</h3>
 <p>Grow your investigator from a rookie with only Tier 1 primary gear into a veteran with fully upgraded equipment, completed talent trees, and mastery over every difficulty.</p>
 </div></div>`;
}
function cursedTalentKey(item){return "cursed"+item.replace(/[^A-Za-z]/g,"")}
function usableCursedItems(){return CURSED_ITEMS.filter(item=>hasTalent(cursedTalentKey(item)))}
function cartographerHtml(){
 if(!hasTalent("cartographer")) return "";
 resetCartographerDaily();
 const done=MAPS.filter(m=>state.cartographerDaily.maps[m]).length;
 const rows=MAPS.map(m=>`<tr><td>${state.cartographerDaily.maps[m]?"✓":"—"}</td><td>${m}</td><td>${state.cartographerDaily.maps[m]?"Claimed":"+100 Gold available"}</td></tr>`).join("");
 return `<div class="card span12"><h2>Daily Bonuses</h2><p class="small">Unlock Dailies: first successful clear on each map today grants a flat +100 Gold. Next reset: <strong>${nextDailyResetText()}</strong></p><p><strong>${done}/${MAPS.length}</strong> claimed · Remaining bonus Gold: <strong>${money((MAPS.length-done)*100)}</strong></p><table><tr><th></th><th>Map</th><th>Status</th></tr>${rows}</table></div>`;
}
function renderCharacter(){
 const need=expNeed(), pct=Math.min(100,state.exp/need*100), md=maxDiff(), cap=tierCap();
 const cursed=usableCursedItems();
 const cursedHtml=cursed.length ? cursed.map(x=>'<span class="pill purple">'+x+'</span>').join(" ") : '<span class="small">None unlocked through talents.</span>';
 let next=LEVEL_DIFF.find(([d,l])=>state.level<l);
 let milestone=next?`Reach Level ${next[1]} to unlock ${next[0]}.`:"Recommended difficulty maxed. Master Insanity and finish your build.";
 const t2=countClearsAtOrAbove("Professional"), t3=countClearsAtOrAbove("Nightmare");
 document.getElementById("character").innerHTML=`
 <div class="grid">
 <div class="card span7"><h2>Character</h2><div class="statrow">
 <div class="stat"><div class="label">Level</div><div class="value">${state.level}</div></div>
 <div class="stat"><div class="label">EXP</div><div class="value">${money(state.exp)} / ${money(need)}</div></div>
 <div class="stat"><div class="label">Gold</div><div class="value">${money(state.gold)}</div></div>
 <div class="stat"><div class="label">Talent Points</div><div class="value">${state.tp}</div></div>
 </div><div style="margin-top:14px"><div class="bar"><div class="fill" style="width:${pct}%"></div></div></div></div>
 <div class="card span5"><h2>Campaign Status</h2>
 <p><span class="label">Recommended Difficulty</span><br><strong class="accent">${md}</strong></p>
 <p><span class="label">Current Milestone</span><br>${milestone}</p>
 <p><span class="label">Gear Tier Unlocks</span><br>Max Gear Tier: <strong>Tier ${cap}</strong></p>
 <p class="small">Tier 2: Professional or higher clears ${Math.min(t2,5)}/5<br>Tier 3: ${cap>=2?`Nightmare or higher clears ${Math.min(t3,5)}/5`:"Locked until Tier 2 is unlocked"}</p>
 </div>
 <div class="card span4"><h2>Latest Loot</h2><p style="font-size:22px;font-weight:900">${state.lastLoot}</p></div>
 <div class="card span4"><h2>Usable Cursed Items</h2><p>${cursedHtml}</p></div>
 <div class="card span4"><h2>Summary</h2><p>Contracts: <strong>${state.contracts}</strong></p><p>Owned Secondary Gear: <strong>${SECONDARY.filter(x=>state.equipment[x].tier>0).length}/${SECONDARY.length}</strong></p><p>Talents Owned: <strong>${Object.keys(state.talents).length}/${TALENTS.length}</strong></p></div>
 ${cartographerHtml()}
 </div>`;
}
function gearCard(n){
 const e=state.equipment[n], locked=e.tier===0;
 return `<div class="gear ${locked?'locked':''}"><div class="name">${n}</div><div class="small">${e.primary?'Primary Gear':'Secondary Gear'}</div><div class="meta">
 <span class="pill ${locked?'bad':'good'}">${locked?'Locked':'Tier '+e.tier}</span>
 <span class="pill">${e.slots}/${itemCap(n)} Slots</span>
 </div></div>`;
}
function renderEquipment(){
 document.getElementById("equipment").innerHTML=`<div class="grid"><div class="card span12"><h2>Primary Gear</h2><div class="equipgrid">${PRIMARY.map(gearCard).join("")}</div></div><div class="card span12"><h2>Secondary Gear</h2><div class="equipgrid">${SECONDARY.map(gearCard).join("")}</div></div></div>`;
}
function renderTalents(){
 const groups={}; TALENTS.forEach(t=>{const g=t[4]||"General"; (groups[g] ||= []).push(t);});
 const order=["Key Unlocks","Cursed Items","General","Experience","Economy","Shop","Loot"];
 const html=order.filter(g=>groups[g]).map(group=>`<h3>${group}</h3><div class="talentgrid">${groups[group].map(t=>{
  const owned=hasTalent(t[0]); return `<div class="talent ${owned?'owned':''}"><h3>${t[1]} <span class="pill">${t[3]} TP</span></h3><p class="small">${t[2]}</p><button ${owned||state.tp<t[3]?'disabled':''} onclick="buyTalent('${t[0]}')">${owned?'Owned':'Learn'}</button></div>`
 }).join("")}</div>`).join("");
 document.getElementById("talents").innerHTML=`<div class="card"><h2>Talents (${state.tp})</h2><p class="small">Earn Talent Points by leveling up. Stronger talents cost more. Key Unlocks open major systems; Cursed Item talents unlock permission to use that cursed possession during contracts.</p>${html}</div>`;
}
function renderProgress(){
 let diffRows=DIFFS.map(d=>`<tr><td>${d}</td><td>${state.diffStats[d].clears}</td><td>${state.diffStats[d].perfects}</td><td>${state.diffStats[d].deaths}</td></tr>`).join("");
 let mapRows=MAPS.map(m=>{
  let cells=DIFFS.map(d=>{let r=state.progress[m][d]; return `<td>${r.perfects?'★':r.clears?'✓':'—'}${r.deaths?` <span class="bad">☠${r.deaths}</span>`:''}</td>`}).join("");
  return `<tr><td>${m}</td>${cells}</tr>`
 }).join("");
 document.getElementById("progress").innerHTML=`<div class="grid"><div class="card span5"><h2>Difficulty Records</h2><table><tr><th>Difficulty</th><th>Clears</th><th>Perfects</th><th>Deaths</th></tr>${diffRows}</table></div><div class="card span7"><h2>Map Completion</h2><table><tr><th>Map</th>${DIFFS.map(d=>`<th>${d[0]}</th>`).join("")}</tr>${mapRows}</table><p class="small">✓ clear, ★ perfect, ☠ deaths</p></div></div>`;
}
function validShopItems(){
 let items=[], cap=tierCap();
 for(const [n,e] of Object.entries(state.equipment)){
  if(!e.primary && e.tier===0) items.push({type:"unlock",target:n,label:`Unlock ${n}`,desc:"Tier 1 + 1 slot"});
  if(e.tier>0 && e.slots<itemCap(n)) items.push({type:"slot",target:n,label:`+1 ${n} Slot`,desc:`Slots ${e.slots} → ${e.slots+1}`});
  if(e.tier>0 && e.tier<Math.min(3,cap)) items.push({type:"tier",target:n,label:`Upgrade ${n}`,desc:`Tier ${e.tier} → ${e.tier+1}`});
 }
 items.push({type:"talentPoint",target:"Talent Point",label:"Buy Talent Point",desc:"Gain +1 unspent Talent Point"});
 return items;
}
function restock(){
 let pool=validShopItems(); const count=hasTalent("logistics")?5:4; state.shop=[];
 while(pool.length && state.shop.length<count){let i=Math.floor(Math.random()*pool.length); state.shop.push(pool.splice(i,1)[0]);}
}
function rerollCost(){return Math.round(state.level*100*(1-(hasTalent("fieldRepairs") ? .10 : 0)-(hasTalent("gambler") ? .10 : 0)))}
function renderShop(){
 if(!hasTalent("unlockShop")){
  document.getElementById("shop").innerHTML=`<div class="card"><h2>Shop Locked</h2><p>The Shop is locked until you learn <strong>Unlock Shop</strong> in the Key Unlocks talent category.</p><button onclick="showTab('talents')">Go to Talents</button></div>`;
  return;
 }
 if(!state.shop.length) restock();
 const cost=rerollCost();
 document.getElementById("shop").innerHTML=`<div class="card"><h2>Shop</h2><p class="small">Stock is rerolled after each contract. Reroll stock costs Level × 100 Gold, reduced by talents.</p><button onclick="rerollShop()">Reroll Stock (${money(cost)} Gold)</button><div class="shopgrid" style="margin-top:12px">${state.shop.map((it,i)=>`<div class="shopitem"><h3>${it.label}</h3><p class="small">${it.desc}</p><p><strong>${money(price(it))} Gold</strong></p><button ${state.gold<price(it)?'disabled':''} onclick="buyShop(${i})">Purchase</button></div>`).join("") || "<p>No valid shop items remain.</p>"}</div></div>`;
}
function renderRules(){
 document.getElementById("rules").innerHTML=`<div class="card rules"><h2>Rules Reference</h2>
 <h3>Character</h3><ul><li>Start at Level 1 with Tier 1 primary gear and one slot each.</li><li>Slot caps follow Phasmophobia item limits instead of a universal cap.</li><li>Secondary gear starts locked at Tier 0 with 0 slots.</li><li>Level gates recommended difficulty: Lv1 Amateur, Lv5 Intermediate, Lv10 Professional, Lv20 Nightmare, Lv35 Insanity.</li></ul>
 <h3>Rewards</h3><ul><li>Enter the in-game reward money after each contract. The tracker converts it into reduced RPG Gold and EXP.</li><li>Correct ghost and survival matter for clears. Deaths are tracked.</li><li>Perfect Investigation requires correct ghost and survival.</li></ul>
 <h3>Loot</h3><ul><li>Loot is always awarded. At your recommended difficulty the table is 30% Equipment Unlock, 25% Slot Unlock, 15% Gear Upgrade, 30% Gold Cache.</li><li>Playing above your recommended difficulty shifts the loot pool toward Gold.</li><li>Rewards never roll something you already own or cannot use.</li><li>Equipment Unlock means Tier 1 + 1 slot for a locked secondary item.</li></ul>
 <h3>Gear Tier Unlocks</h3><ul><li>Tier 1 is available by default.</li><li>Tier 2 upgrades unlock after 5 Professional-or-higher clears.</li><li>Tier 3 upgrades unlock after 5 Nightmare-or-higher clears, but only after Tier 2 is unlocked.</li></ul>
 <h3>Shop</h3><ul><li>The Shop is locked until you learn Unlock Shop for 3 TP.</li><li>Gold buys equipment unlocks, gear upgrades, slot unlocks, and randomly available Talent Points.</li><li>Stock is rerolled after each contract.</li><li>Reroll stock costs Player Level × 100 Gold, reduced by talents.</li></ul>
 <h3>Cursed Items</h3><ul><li>Cursed possessions require their matching Cursed Item talent before your character may use them.</li><li>Unlocked cursed items are shown on the Character page.</li></ul>
 <h3>Dailies</h3><ul><li>Unlock Dailies grants +100 Gold for the first successful clear on each map each day.</li><li>This bonus is flat and is not increased by other Gold talents.</li><li>When unlocked, daily map progress appears on the Character page.</li></ul>
 <h3>Multiplayer</h3><ul><li>Each player tracks their own character.</li><li>You may use the host's gear, even if your character has not unlocked it.</li><li>Playing above your recommended difficulty shifts loot toward reduced Gold instead of equipment progression.</li></ul><h3>Save Compatibility</h3><ul><li>Saves include a version number and are repaired on load.</li><li>Older saves automatically receive missing fields for new talents, dailies, shop gating, slot caps, and progress tracking.</li><li>Future talent additions should not require a new character.</li></ul>
 </div>`;
}
function buyTalent(k){let t=TALENTS.find(x=>x[0]===k); if(!t||state.talents[k]||state.tp<t[3])return; state.tp-=t[3]; state.talents[k]=true; render();}
function buyShop(i){
 const it=state.shop[i], p=price(it); if(!it||state.gold<p)return; state.gold-=p; applyReward(it); state.shop.splice(i,1);
 document.getElementById("shopBody").innerHTML=`<p><strong>${it.label}</strong></p>${it.type==="talentPoint"?"<p>You gained +1 Talent Point.</p>":"<p>Update your loadout in-game before your next contract.</p>"}`;
 openModal("shopModal"); render();
}
function rerollShop(){
 const cost=rerollCost();
 if(state.gold<cost){alert("Not enough Gold.");return} state.gold-=cost; restock(); render();
}
function applyReward(r){
 if(r.type==="talentPoint"){state.tp++; state.lastLoot="Talent Point +1"; return;}
 const e=state.equipment[r.target];
 if(r.type==="unlock"){e.tier=1;e.slots=1;state.lastLoot=`Unlocked ${r.target}`;}
 if(r.type==="slot"){e.slots=Math.min(itemCap(r.target),e.slots+1);state.lastLoot=`+1 ${r.target} Slot`;}
 if(r.type==="tier"){e.tier=Math.min(3,e.tier+1);state.lastLoot=`${r.target} Tier ${e.tier}`;}
}
function openModal(id){document.getElementById(id).classList.add("active")}
function closeModal(id){document.getElementById(id).classList.remove("active")}
function openContract(){
 const m=document.getElementById("cMap"), d=document.getElementById("cDiff");
 m.innerHTML=`<option value="">-- Please Select --</option>`+MAPS.map(x=>`<option>${x}</option>`).join("");
 d.innerHTML=DIFFS.map(x=>`<option ${x===maxDiff()?'selected':''}>${x}</option>`).join("");
 document.getElementById("cMoney").value="";
 ["cCorrect","cAlive"].forEach(id=>document.getElementById(id).checked=true);
 document.getElementById("cPerfect").checked=false;
 clearValidation(); openModal("contractModal");
}
function clearValidation(){document.getElementById("contractErrors").style.display="none"; document.querySelectorAll("#contractModal .invalid").forEach(x=>x.classList.remove("invalid"))}
function submitContract(){
 clearValidation();
 resetCartographerDaily();
 const map=document.getElementById("cMap"), diff=document.getElementById("cDiff"), moneyIn=document.getElementById("cMoney");
 const val=Number(moneyIn.value), correct=document.getElementById("cCorrect").checked, alive=document.getElementById("cAlive").checked, perfect=document.getElementById("cPerfect").checked;
 let errs=[];
 if(!map.value){errs.push("Select a map."); map.classList.add("invalid")}
 if(!val || val<1 || val>10000){errs.push("Reward Money must be between 1 and 10,000."); moneyIn.classList.add("invalid")}
 if(perfect && (!correct || !alive)){errs.push("A Perfect Investigation requires correct ghost identification and surviving.");}
 if(errs.length){let e=document.getElementById("contractErrors"); e.innerHTML="<strong>Please correct:</strong><ul><li>"+errs.join("</li><li>")+"</li></ul>"; e.style.display="block"; return;}
 const rec=diffIndex(maxDiff()), played=diffIndex(diff.value), above=Math.max(0,played-rec);
 let expBase=Math.floor(val*.32), goldBase=Math.floor(val*.22);
 let expBonus=0, goldBonus=0, talentLines=[];
 if(correct){expBonus+=30; goldBonus+=30; if(hasTalent("professional")){goldBonus+=20; talentLines.push("Professional: +20 Gold");}}
 if(alive){expBonus+=20}
 if(perfect){expBonus+=50; goldBonus+=75}
 if(perfect && hasTalent("veteranInvestigator")){goldBonus+=100; talentLines.push("Veteran Investigator: +100 Gold");}
 let expBeforeTalents=expBase+expBonus, goldBeforeTalents=goldBase+goldBonus;
 let expAfterTalents=expBeforeTalents, goldAfterTalents=goldBeforeTalents;
 if(hasTalent("photographer")){ const before=expAfterTalents; expAfterTalents=Math.floor(expAfterTalents*1.05); talentLines.push(`Photographer: +${expAfterTalents-before} EXP`); }
 if(hasTalent("experience")){ const before=expAfterTalents; expAfterTalents=Math.floor(expAfterTalents*1.05); talentLines.push(`Experience: +${expAfterTalents-before} EXP`); }
 if(hasTalent("survivor")&&alive){ const before=expAfterTalents; expAfterTalents=Math.floor(expAfterTalents*1.05); talentLines.push(`Survivor: +${expAfterTalents-before} EXP`); }
 if(hasTalent("keenEye")){ const before=goldAfterTalents; goldAfterTalents=Math.floor(goldAfterTalents*1.05); talentLines.push(`Keen Eye: +${goldAfterTalents-before} Gold`); }
 if(hasTalent("thorough")){ const before=goldAfterTalents; goldAfterTalents=Math.floor(goldAfterTalents*1.05); talentLines.push(`Thorough: +${goldAfterTalents-before} Gold`); }
 let exp=expAfterTalents, gold=goldAfterTalents;
 const penalty=Math.max(.2,1-(hasTalent("fortuneFavors") ? .15 : .2)*above);
 if(above>0){ exp=Math.floor(exp*penalty); gold=Math.floor(gold*penalty); talentLines.push(`Above recommended difficulty: ${Math.round(penalty*100)}% EXP/Gold`); }
 if(hasTalent("fastLearner")&&state.firstSession){exp+=50; state.firstSession=false; talentLines.push("Fast Learner: +50 EXP");}
 let cartographerBonus=0;
 const successfulClear=correct && alive;
 if(successfulClear && hasTalent("cartographer") && !state.cartographerDaily.maps[map.value]){
  cartographerBonus=100;
  state.cartographerDaily.maps[map.value]=true;
 }
 if(successfulClear && hasTalent("mapExpert")){
  let lifetime=0; for(const d of DIFFS) lifetime += state.progress[map.value][d].clears||0;
  if(lifetime<5){ gold+=25; talentLines.push("Route Planner: +25 Gold"); }
 }
 state.exp+=exp; state.gold+=gold+cartographerBonus; state.contracts++;
 if(successfulClear){state.progress[map.value][diff.value].clears++; state.diffStats[diff.value].clears++}
 if(perfect){state.progress[map.value][diff.value].perfects++; state.diffStats[diff.value].perfects++}
 if(!alive){state.progress[map.value][diff.value].deaths++; state.diffStats[diff.value].deaths++}
 const loot=rollLoot(above); let loadoutMsg = loot.type==="gold" || loot.type==="talentPoint" ? "" : "<p class='warn'>Update your loadout in-game and click Continue.</p>";
 levelUp();
 if(hasTalent("unlockShop")) restock();
 closeModal("contractModal");
 const talentHtml = talentLines.length ? `<h3>Talent & Modifier Bonuses</h3><ul>${talentLines.map(x=>`<li>${x}</li>`).join("")}</ul>` : "";
 const cartHtml = cartographerBonus ? `<p><strong>🗺 Cartographer Bonus:</strong> +${money(cartographerBonus)} Gold</p>` : "";
 document.getElementById("resultBody").innerHTML=`<p><strong>You earned ${money(exp)} EXP and ${money(gold)} Gold!</strong></p>${talentHtml}${cartHtml}<p>Bonus Loot: <strong>${loot.text}</strong></p>${loadoutMsg}`;
 openModal("resultModal"); render();
}
function levelUp(){
 while(state.exp>=expNeed()){state.exp-=expNeed(); state.level++; state.tp++; if(hasTalent("prepared"))state.gold+=75; if(hasTalent("seasonedSpecialist"))state.gold+=75;}
}
function rollLoot(above){
 const valid=validShopItems();
 const weights = [
  {type:"unlock",w:[30,20,10,5,0][above]??0},
  {type:"slot",w:[25,20,10,5,0][above]??0},
  {type:"tier",w:[15,10,10,5,0][above]??0},
  {type:"gold",w:[30,50,70,85,100][above]??100}
 ];
 if(hasTalent("luckyFind")) weights.find(x=>x.type==="unlock").w+=5;
 if(hasTalent("arsenal")) weights.find(x=>x.type==="slot").w+=5;
 let categories=weights.map(x=>({...x, items:x.type==="gold"?[{}]:valid.filter(v=>v.type===x.type)})).filter(x=>x.w>0&&x.items.length);
 let total=categories.reduce((s,x)=>s+x.w,0), r=Math.random()*total, cat=categories[0];
 for(const c of categories){if((r-=c.w)<=0){cat=c;break}}
 if(!cat || cat.type==="gold"){
  let g=100+state.level*15; if(hasTalent("treasureHunter")||hasTalent("stockpile"))g=Math.floor(g*1.1); if(hasTalent("jackpot")&&Math.random()<.05)g+=100;
  state.gold+=g; state.lastLoot=`Gold Cache: ${money(g)} Gold`; return {type:"gold",text:`${money(g)} Gold Cache`};
 }
 const item=cat.items[Math.floor(Math.random()*cat.items.length)]; applyReward(item); return {type:item.type,text:state.lastLoot};
}
function saveFile(){
 state=repairSave(state);
 const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
 const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="phasmophobia-rpg-character-v1.0.3.json"; a.click();
}
function loadFile(ev){
 const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{state=repairSave(JSON.parse(r.result)); render(); alert("Character loaded and updated for v1.0.3.");}catch(err){alert("Could not load character file. The save may be corrupted or not valid JSON.");}}; r.readAsText(f);
}
function newCharacter(){if(confirm("Start a new character? This clears browser autosave.")){state=fresh();localStorage.removeItem("phasmoRpgV1");render()}}
render();
</script>
</body>
</html>
